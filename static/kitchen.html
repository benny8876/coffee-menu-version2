<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Panel - Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <!-- Staff Login Gate -->
    <div id="login-gate" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-6">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
            <h1 class="text-2xl font-black text-emerald-400 mb-2">Kitchen Access</h1>
            <p class="text-xs text-slate-400 mb-6">Enter staff PIN to view and manage orders.</p>
            <input type="password" id="kitchen-pin-input" placeholder="Kitchen PIN"
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm mb-4 outline-none focus:border-emerald-500">
            <button onclick="loginKitchen()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-bold text-sm transition">
                Unlock Kitchen Panel
            </button>
            <p id="login-error" class="text-rose-400 text-xs mt-3 hidden"></p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-2xl font-black text-emerald-400">Kitchen Display System</h1>
            <p class="text-xs text-slate-400">Paid and validated orders monitor</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="logoutKitchen()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-slate-300">Logout</button>
            <span id="audio-status-banner" class="text-xs bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1 rounded-lg">
                🔔 Click anywhere to enable alert sounds
            </span>
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse" id="ws-indicator"></span>
                <span class="text-xs text-slate-400 font-medium" id="ws-status">Connecting...</span>
            </div>
        </div>
    </header>

    <section id="alerts-container" class="max-w-7xl mx-auto px-6 mt-4 space-y-2"></section>
    <div id="new-order-flash" class="fixed inset-0 pointer-events-none z-40 hidden bg-amber-400/30"></div>

    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-amber-400 flex items-center gap-2">
                    Pending <span class="bg-amber-400/20 text-amber-400 px-2 py-0.5 rounded-full text-xs" id="count-pending">0</span>
                </h2>
            </div>
            <div id="pending-orders" class="space-y-4 max-h-[70vh] overflow-y-auto pr-1"></div>
        </div>

        <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-blue-400 flex items-center gap-2">
                    Preparing <span class="bg-blue-400/20 text-blue-400 px-2 py-0.5 rounded-full text-xs" id="count-preparing">0</span>
                </h2>
            </div>
            <div id="preparing-orders" class="space-y-4 max-h-[70vh] overflow-y-auto pr-1"></div>
        </div>

        <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-emerald-400 flex items-center gap-2">
                    Served / Ready <span class="bg-emerald-400/20 text-emerald-400 px-2 py-0.5 rounded-full text-xs" id="count-served">0</span>
                </h2>
            </div>
            <div id="served-orders" class="space-y-4 max-h-[70vh] overflow-y-auto pr-1"></div>
        </div>
    </main>

    <script>
        const API_BASE = `${window.location.origin}/api/v1`;
        let kitchenToken = sessionStorage.getItem('kitchen_token');
        let audioCtx = null;
        const ALERT_VOLUME = 1.0;

        function ensureAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function markAudioActive() {
            const banner = document.getElementById('audio-status-banner');
            if (banner) {
                banner.innerText = "🔊 Audio Active";
                banner.className = "text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-lg";
            }
        }

        function getAuthHeaders() {
            return {
                'Authorization': `Bearer ${kitchenToken}`,
                'Content-Type': 'application/json'
            };
        }

        function showLoginGate(show) {
            document.getElementById('login-gate').classList.toggle('hidden', !show);
        }

        async function loginKitchen() {
            const pin = document.getElementById('kitchen-pin-input').value;
            const errorEl = document.getElementById('login-error');
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/kitchen/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                if (!response.ok) {
                    errorEl.innerText = 'Invalid PIN. Please try again.';
                    errorEl.classList.remove('hidden');
                    return;
                }
                const data = await response.json();
                kitchenToken = data.token;
                sessionStorage.setItem('kitchen_token', kitchenToken);
                showLoginGate(false);
                ensureAudioContext();
                markAudioActive();
                fetchOrders();
                connectWS();
            } catch (err) {
                errorEl.innerText = 'Connection failed. Please retry.';
                errorEl.classList.remove('hidden');
            }
        }

        function logoutKitchen() {
            sessionStorage.removeItem('kitchen_token');
            kitchenToken = null;
            location.reload();
        }

        document.getElementById('kitchen-pin-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginKitchen();
        });

        document.body.addEventListener('click', () => {
            ensureAudioContext();
            markAudioActive();
        }, { once: true });

        function playTone(ctx, frequency, startTime, duration, volume = ALERT_VOLUME) {
            const oscillator = ctx.createOscillator();
            const gain = ctx.createGain();
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(frequency, startTime);
            gain.gain.setValueAtTime(volume, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            oscillator.connect(gain);
            gain.connect(ctx.destination);
            oscillator.start(startTime);
            oscillator.stop(startTime + duration);
        }

        function flashNewOrderScreen() {
            const flash = document.getElementById('new-order-flash');
            if (!flash) return;
            flash.classList.remove('hidden');
            setTimeout(() => flash.classList.add('hidden'), 900);
        }

        function vibrateNewOrderAlert() {
            if (navigator.vibrate) {
                navigator.vibrate([400, 120, 400, 120, 400, 120, 600]);
            }
        }

        function showNewOrderBanner(tableNumber) {
            const container = document.getElementById('alerts-container');
            const alertBox = document.createElement('div');
            alertBox.className = "bg-amber-500 text-slate-900 font-black p-4 rounded-xl flex justify-between items-center shadow-lg animate-bounce border-2 border-amber-300";
            alertBox.innerHTML = `
                <span>🍳 NEW ORDER${tableNumber ? ` - Table ${tableNumber}` : ''}!</span>
                <button onclick="this.parentElement.remove()" class="bg-slate-900/20 hover:bg-slate-900/30 text-slate-900 font-black px-3 py-1 rounded-lg text-xs">Dismiss</button>
            `;
            container.prepend(alertBox);
            setTimeout(() => alertBox.remove(), 12000);
        }

        function playNewOrderChime(tableNumber) {
            try {
                const ctx = ensureAudioContext();
                if (ctx.state === 'suspended') return;

                const now = ctx.currentTime;
                const pattern = [
                    { freq: 880, start: 0, duration: 0.18 },
                    { freq: 988, start: 0.22, duration: 0.18 },
                    { freq: 1175, start: 0.44, duration: 0.18 },
                    { freq: 880, start: 0.72, duration: 0.18 },
                    { freq: 988, start: 0.94, duration: 0.18 },
                    { freq: 1175, start: 1.16, duration: 0.28 },
                ];

                pattern.forEach((tone) => {
                    playTone(ctx, tone.freq, now + tone.start, tone.duration, ALERT_VOLUME);
                });

                setTimeout(() => {
                    const repeatAt = ctx.currentTime;
                    pattern.forEach((tone) => {
                        playTone(ctx, tone.freq, repeatAt + tone.start, tone.duration, ALERT_VOLUME);
                    });
                }, 1500);

                vibrateNewOrderAlert();
                flashNewOrderScreen();
                showNewOrderBanner(tableNumber);
            } catch (e) {
                console.error("Audio synthesis blocked: ", e);
            }
        }

        async function fetchOrders() {
            if (!kitchenToken) return;
            try {
                const response = await fetch(`${API_BASE}/kitchen/orders`, {
                    headers: getAuthHeaders()
                });
                if (response.status === 401) {
                    logoutKitchen();
                    return;
                }
                const orders = await response.json();
                renderOrders(orders);
            } catch (err) {
                console.error("Failed to query records.");
            }
        }

        function cancelButton(orderId) {
            return `<button onclick="cancelOrder(${orderId})" class="w-full bg-rose-600/80 hover:bg-rose-700 py-1.5 rounded-lg text-xs font-bold transition mt-2">Cancel Order</button>`;
        }

        function renderOrders(orders) {
            const pendingDiv = document.getElementById("pending-orders");
            const preparingDiv = document.getElementById("preparing-orders");
            const servedDiv = document.getElementById("served-orders");

            pendingDiv.innerHTML = "";
            preparingDiv.innerHTML = "";
            servedDiv.innerHTML = "";

            let pendingCount = 0, preparingCount = 0, servedCount = 0;

            orders.forEach(order => {
                const card = document.createElement("div");
                card.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md space-y-3";

                const itemsHtml = order.items.map(i => {
                    const modsSubtext = i.selected_modifiers.map(m => `
                        <div class="text-[11px] text-amber-400 pl-4">+ ${m.modifier.name}</div>
                    `).join("");

                    return `
                        <div class="border-b border-slate-700/50 pb-2">
                            <div class="text-sm">
                                <span><b class="text-slate-200">${i.quantity}x</b> ${i.menu_item.name}</span>
                            </div>
                            ${i.notes ? `
                                <div class="mt-1 text-xs font-semibold text-amber-300 bg-amber-500/10 border border-amber-500/30 rounded px-2 py-1">
                                    📝 ${i.notes}
                                </div>
                            ` : ''}
                            ${modsSubtext}
                        </div>
                    `;
                }).join("");

                let actionsHtml = "";
                if (order.status === "pending") {
                    actionsHtml = `
                        <button onclick="updateStatus(${order.id}, 'preparing')" class="w-full bg-blue-600 hover:bg-blue-700 py-1.5 rounded-lg text-xs font-bold transition">Start Cooking</button>
                        ${cancelButton(order.id)}
                    `;
                    pendingCount++;
                    card.innerHTML = createCardTemplate(order, itemsHtml, actionsHtml);
                    pendingDiv.appendChild(card);
                } else if (order.status === "preparing") {
                    actionsHtml = `
                        <button onclick="updateStatus(${order.id}, 'served')" class="w-full bg-emerald-600 hover:bg-emerald-700 py-1.5 rounded-lg text-xs font-bold transition">Mark Ready</button>
                        ${cancelButton(order.id)}
                    `;
                    preparingCount++;
                    card.innerHTML = createCardTemplate(order, itemsHtml, actionsHtml);
                    preparingDiv.appendChild(card);
                } else if (order.status === "served") {
                    actionsHtml = `
                    <div class="w-full text-center bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 py-1.5 rounded-lg text-xs font-bold">
                    ✓ Food Delivered to Table
                    </div>
                    `;
                    servedCount++;
                    card.innerHTML = createCardTemplate(order, itemsHtml, actionsHtml);
                    servedDiv.appendChild(card);
                }
            });

            document.getElementById("count-pending").innerText = pendingCount;
            document.getElementById("count-preparing").innerText = preparingCount;
            document.getElementById("count-served").innerText = servedCount;
        }

        function createCardTemplate(order, itemsHtml, actionsHtml) {
            const timeStr = new Date(order.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="flex justify-between items-center">
                    <span class="text-xs text-slate-400 font-mono">ID: #${order.id}</span>
                    <span class="text-xs text-slate-400">${timeStr}</span>
                </div>
                <div class="bg-slate-900/40 p-2 rounded-lg text-center">
                    <h3 class="font-bold text-lg text-white">Table ${order.table.label}</h3>
                </div>
                <div class="space-y-1 my-2">
                    ${itemsHtml}
                </div>
                <div class="pt-2">
                    ${actionsHtml}
                </div>
            `;
        }

        async function updateStatus(orderId, nextStatus) {
            try {
                await fetch(`${API_BASE}/kitchen/orders/${orderId}/status?status=${nextStatus}`, {
                    method: 'PATCH',
                    headers: getAuthHeaders()
                });
                fetchOrders();
            } catch (err) {
                console.error("Failed to alter status.");
            }
        }

        async function cancelOrder(orderId) {
            if (!confirm('Cancel this order? Stock will be restored.')) return;
            try {
                const response = await fetch(`${API_BASE}/kitchen/orders/${orderId}/cancel`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                if (response.ok) {
                    fetchOrders();
                } else {
                    const err = await response.json();
                    alert(err.detail || 'Could not cancel order.');
                }
            } catch (err) {
                console.error("Failed to cancel order.");
            }
        }

        function playWaiterAlertSound() {
            try {
                const ctx = ensureAudioContext();
                if (ctx.state === 'suspended') return;

                playTone(ctx, 880, ctx.currentTime, 0.2, 0.8);
            } catch (e) {
                console.error(e);
            }
        }

        function triggerStaffSummonAlert(tableNum, serviceRequest) {
            const container = document.getElementById('alerts-container');
            const alertBox = document.createElement('div');
            alertBox.className = "bg-rose-500 text-white font-bold p-4 rounded-xl flex justify-between items-center shadow-lg animate-bounce";
            alertBox.innerHTML = `
                <span>🛎️ Alert: Table ${tableNum} requested [${serviceRequest}]!</span>
                <button onclick="this.parentElement.remove()" class="bg-white/20 hover:bg-white/30 text-white font-black px-3 py-1 rounded-lg text-xs">Dismiss</button>
            `;
            container.appendChild(alertBox);
            playWaiterAlertSound();
        }

        function connectWS() {
            if (!kitchenToken) return;
            const WS_URL = `${window.location.protocol === "https:" ? "wss:" : "ws:"}//${window.location.host}/api/v1/kitchen/ws?token=${encodeURIComponent(kitchenToken)}`;
            const ws = new WebSocket(WS_URL);
            const statusIndicator = document.getElementById("ws-indicator");
            const statusLabel = document.getElementById("ws-status");

            ws.onopen = () => {
                statusIndicator.className = "h-2 w-2 rounded-full bg-emerald-500 animate-pulse";
                statusLabel.innerText = "Connected";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.event === "service_request") {
                    triggerStaffSummonAlert(data.table_number, data.request);
                } else if (data.event === "new_order") {
                    const tableNumber = data.order && data.order.table ? data.order.table.label : null;
                    playNewOrderChime(tableNumber);
                    fetchOrders();
                } else {
                    fetchOrders();
                }
            };

            ws.onclose = () => {
                statusIndicator.className = "h-2 w-2 rounded-full bg-red-500";
                statusLabel.innerText = "Offline (Reconnecting)";
                setTimeout(connectWS, 5000);
            };
        }

        if (kitchenToken) {
            showLoginGate(false);
            fetchOrders();
            connectWS();
        } else {
            showLoginGate(true);
        }
    </script>
</body>
</html>
